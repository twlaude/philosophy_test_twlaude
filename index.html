<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실습일지 AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text-1: #1D1D1F;
      --text-2: #6E6E73;
      --text-3: #AEAEB2;
      --border: #E5E5EA;
      --accent: #1D1D1F;
      --accent-hover: #424245;
      --blue: #0071E3;
      --radius: 12px;
      --transition: 0.15s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,250,0.85);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
    }
    .header-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-1);
    }
    .logo span {
      font-weight: 400;
      color: var(--text-3);
      font-size: 13px;
      margin-left: 8px;
    }
    .api-badge {
      font-size: 12px;
      color: var(--text-3);
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .api-badge:hover { border-color: var(--text-2); color: var(--text-2); }
    .api-badge.on { color: #34C759; border-color: #34C759; }
    .api-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-3);
    }
    .api-badge.on .api-dot { background: #34C759; }

    /* ── Container ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 32px;
    }
    .section-head {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 16px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"], input[type="date"],
    input[type="number"], select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-1);
      background: var(--bg);
      transition: var(--transition);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--text-1);
      background: var(--surface);
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.8; }
    .row { display: grid; gap: 12px; margin-bottom: 14px; }
    .row-2 { grid-template-columns: 1fr 1fr; }
    .row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    /* ── API Section ── */
    .api-section {
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
      background: var(--surface);
    }
    .api-section.hidden { display: none; }
    .api-row { display: flex; gap: 8px; }
    .api-row input { flex: 1; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-dark {
      background: var(--accent);
      color: #fff;
    }
    .btn-dark:hover { background: var(--accent-hover); }
    .btn-dark:disabled { background: var(--text-3); cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--text-1); color: var(--text-1); }
    .btn-full {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 15px;
      border-radius: 10px;
      letter-spacing: -0.2px;
    }

    /* ── Activity Items ── */
    .act-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
      background: var(--bg);
    }
    .act-item .row { margin-bottom: 10px; }
    .act-del {
      position: absolute; top: 10px; right: 10px;
      width: 24px; height: 24px;
      border: none; background: transparent;
      color: var(--text-3); cursor: pointer;
      border-radius: 6px; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .act-del:hover { background: #FFE5E5; color: #FF3B30; }
    .add-btn {
      width: 100%;
      padding: 12px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text-3);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }
    .add-btn:hover { border-color: var(--text-2); color: var(--text-2); }

    /* ── Result ── */
    .result { display: none; }
    .result.on { display: block; }
    .journal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .j-head {
      padding: 24px 28px;
      border-bottom: 2px solid var(--text-1);
      text-align: center;
    }
    .j-head h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 8px;
    }
    .j-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .j-table th, .j-table td {
      border: 1px solid #D2D2D7;
      padding: 10px 14px;
      vertical-align: middle;
    }
    .j-table th {
      background: #F5F5F7;
      font-weight: 600;
      text-align: center;
      color: var(--text-2);
      white-space: nowrap;
      width: 88px;
      font-size: 12px;
    }
    .j-table td { text-align: left; line-height: 1.8; }
    .j-stamp {
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      width: 72px;
    }
    .j-stamp-circle {
      display: inline-block;
      width: 36px; height: 36px;
      border: 1.5px solid #D2D2D7;
      border-radius: 50%;
      line-height: 33px;
      font-size: 10px;
      color: #C7C7CC;
      margin-top: 3px;
    }
    .j-progress { padding: 0 !important; }
    .j-p-table { width: 100%; border-collapse: collapse; }
    .j-p-table td {
      border: none;
      border-bottom: 1px solid #F2F2F7;
      padding: 8px 14px;
      vertical-align: top;
    }
    .j-p-table tr:last-child td { border-bottom: none; }
    .j-p-time {
      width: 88px;
      text-align: center;
      font-weight: 500;
      font-size: 12px;
      color: var(--text-2);
      border-right: 1px solid #F2F2F7 !important;
    }
    .j-p-content { font-size: 13px; line-height: 1.8; }
    .j-opinion { min-height: 72px; line-height: 1.9; font-size: 13px; color: var(--text-2); }
    .j-section-note {
      background: #F5F5F7;
      text-align: center;
      font-size: 11px;
      color: var(--text-3);
      padding: 5px 14px !important;
    }

    .result-actions {
      display: flex; gap: 8px;
      margin-top: 16px; justify-content: flex-end;
    }

    /* ── Image ── */
    .j-img-section {
      margin: 20px 28px 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .j-img-section h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-2); }
    .j-img-section img { max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }
    .img-loading {
      display: flex; align-items: center; gap: 8px;
      padding: 14px; background: var(--bg);
      border-radius: 8px; font-size: 12px; color: var(--text-3);
    }
    .mini-spin {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--text-2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Overlay ── */
    .overlay {
      display: none; position: fixed;
      inset: 0; z-index: 1000;
      background: rgba(250,250,250,0.92);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      flex-direction: column; gap: 16px;
    }
    .overlay.on { display: flex; }
    .spin {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--text-1);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay-text { font-size: 14px; color: var(--text-2); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px; border-radius: 100px;
      font-size: 13px; font-weight: 500;
      z-index: 2000; opacity: 0;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.ok { background: var(--text-1); color: #fff; }
    .toast.err { background: #FF3B30; color: #fff; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .row-2, .row-3 { grid-template-columns: 1fr; }
      .header-inner { gap: 12px; }
      .panel { padding: 18px; }
      .j-head { padding: 18px 20px; }
      .j-head h2 { font-size: 17px; letter-spacing: 4px; }
    }

    /* ── Print ── */
    @media print {
      .header, .section:not(.result), .api-section, .result-actions { display: none !important; }
      .result { display: block !important; }
      .journal { box-shadow: none; border: none; }
      body { background: #fff; }
      .container { padding: 0; max-width: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">실습일지 AI<span>사회복지현장실습</span></div>
      <div class="api-badge" id="apiBadge" onclick="toggleApi()">
        <span class="api-dot"></span>
        <span id="apiBadgeText">API 미연결</span>
      </div>
    </div>
  </header>

  <div class="overlay" id="overlay">
    <div class="spin"></div>
    <div class="overlay-text" id="overlayText">일지를 작성하고 있습니다</div>
  </div>
  <div class="toast" id="toast"></div>

  <main class="container">
    <!-- API -->
    <div class="api-section" id="apiBox">
      <label>Gemini API Key</label>
      <div class="api-row">
        <input type="password" id="apiInput" placeholder="AIza...">
        <button type="button" class="btn btn-dark" onclick="saveKey()">저장</button>
      </div>
      <p class="hint" style="margin-top:8px">키는 브라우저에만 저장됩니다. <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style="color:var(--blue)">발급받기</a></p>
    </div>

    <!-- 1. 기본정보 -->
    <div class="section">
      <div class="section-head">01 — 기본 정보</div>
      <div class="panel">
        <div class="row row-3">
          <div class="field"><label>실습일</label><input type="date" id="fDate"></div>
          <div class="field"><label>요일</label>
            <select id="fDay">
              <option value="월">월요일</option><option value="화">화요일</option>
              <option value="수">수요일</option><option value="목">목요일</option>
              <option value="금">금요일</option><option value="토">토요일</option>
              <option value="일">일요일</option>
            </select>
          </div>
          <div class="field"><label>회차</label><input type="number" id="fRound" placeholder="1" min="1" max="20"></div>
        </div>
        <div class="row row-3">
          <div class="field"><label>출근</label><input type="text" id="fStart" placeholder="09:00"></div>
          <div class="field"><label>퇴근</label><input type="text" id="fEnd" placeholder="18:00"></div>
          <div class="field"><label>총 시간</label><input type="text" id="fTotal" placeholder="8"></div>
        </div>
        <div class="row row-2">
          <div class="field"><label>실습기관</label><input type="text" id="fOrg" placeholder="○○종합사회복지관"></div>
          <div class="field"><label>실습생</label><input type="text" id="fName" placeholder="이름"></div>
        </div>
      </div>
    </div>

    <!-- 2. 목표 + 활동 -->
    <div class="section">
      <div class="section-head">02 — 목표 및 활동</div>
      <div class="panel">
        <div class="field">
          <label>오늘의 목표</label>
          <textarea id="fGoal" rows="2" placeholder="예: 이용자와의 라포 형성을 연습하고, 프로그램 운영과정을 관찰한다."></textarea>
          <p class="hint">간단히 적으면 AI가 다듬어줍니다</p>
        </div>
        <div style="height:16px"></div>
        <label>시간별 진행사항</label>
        <div id="actList">
          <div class="act-item">
            <button type="button" class="act-del" onclick="delAct(this)">×</button>
            <div class="row row-2">
              <div class="field"><label>시간</label><input type="text" class="a-time" placeholder="09:00~10:00"></div>
              <div class="field"><label>구분</label>
                <select class="a-cat">
                  <option>출석/조회</option><option>오리엔테이션</option>
                  <option>교육/강의</option><option>프로그램 참여</option>
                  <option>프로그램 보조</option><option>상담 관찰</option>
                  <option>사례 관리</option><option>행정 업무</option>
                  <option>지역사회 탐방</option><option>슈퍼비전</option>
                  <option>기관 분석</option><option>기타</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>내용</label>
              <textarea class="a-content" rows="2" placeholder="간단히 적어주세요"></textarea>
            </div>
          </div>
        </div>
        <button type="button" class="add-btn" onclick="addAct()">+ 시간대 추가</button>
      </div>
    </div>

    <!-- 3. 추가 -->
    <div class="section">
      <div class="section-head">03 — 의견 (선택)</div>
      <div class="panel">
        <div class="field">
          <label>실습생 의견 키워드</label>
          <textarea id="fReflect" rows="2" placeholder="느낀점이나 키워드를 적으면 AI가 성찰적 의견으로 확장합니다"></textarea>
        </div>
        <div class="field">
          <label>실습지도자 의견</label>
          <textarea id="fSuper" rows="2" placeholder="비워두면 AI가 예시를 생성합니다"></textarea>
        </div>
        <div class="field">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:400">
            <input type="checkbox" id="fImg" style="width:auto;accent-color:var(--text-1)">
            일러스트 이미지 생성
          </label>
          <p class="hint">Gemini로 활동 관련 일러스트를 생성합니다</p>
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-dark btn-full" id="genBtn" onclick="generate()">
      실습일지 생성
    </button>

    <!-- Result -->
    <div class="section result" id="resultArea">
      <div style="height:32px"></div>
      <div class="section-head">생성 완료</div>
      <div class="journal" id="journalOut"></div>
      <div class="result-actions">
        <button type="button" class="btn btn-ghost" onclick="copyText()">복사</button>
        <button type="button" class="btn btn-ghost" onclick="window.print()">인쇄</button>
        <button type="button" class="btn btn-dark" onclick="dlHTML()">HTML 저장</button>
      </div>
    </div>
  </main>

  <script>
    let apiKey = localStorage.getItem('gemini_api_key') || '';
    let plainText = '';

    document.addEventListener('DOMContentLoaded', () => {
      const t = new Date();
      document.getElementById('fDate').value = t.toISOString().split('T')[0];
      document.getElementById('fDay').value = ['일','월','화','수','목','금','토'][t.getDay()];
      if (apiKey) { setApiBadge(true); document.getElementById('apiBox').classList.add('hidden'); }
      loadSaved();
      document.getElementById('fDate').addEventListener('change', e => {
        const d = new Date(e.target.value);
        if (!isNaN(d)) document.getElementById('fDay').value = ['일','월','화','수','목','금','토'][d.getDay()];
      });
    });

    function toggleApi() {
      const b = document.getElementById('apiBox');
      b.classList.toggle('hidden');
      if (!b.classList.contains('hidden')) document.getElementById('apiInput').focus();
    }
    function saveKey() {
      const k = document.getElementById('apiInput').value.trim();
      if (!k) { toast('API 키를 입력해주세요', false); return; }
      apiKey = k; localStorage.setItem('gemini_api_key', k);
      setApiBadge(true); document.getElementById('apiBox').classList.add('hidden');
      toast('API 키 저장됨', true);
    }
    function setApiBadge(on) {
      const el = document.getElementById('apiBadge');
      const tx = document.getElementById('apiBadgeText');
      if (on) { el.classList.add('on'); tx.textContent = '연결됨'; }
      else { el.classList.remove('on'); tx.textContent = 'API 미연결'; }
    }

    function addAct() {
      const list = document.getElementById('actList');
      const d = document.createElement('div');
      d.className = 'act-item';
      d.innerHTML = `
        <button type="button" class="act-del" onclick="delAct(this)">×</button>
        <div class="row row-2">
          <div class="field"><label>시간</label><input type="text" class="a-time" placeholder="10:00~12:00"></div>
          <div class="field"><label>구분</label>
            <select class="a-cat">
              <option>출석/조회</option><option>오리엔테이션</option>
              <option>교육/강의</option><option>프로그램 참여</option>
              <option>프로그램 보조</option><option>상담 관찰</option>
              <option>사례 관리</option><option>행정 업무</option>
              <option>지역사회 탐방</option><option>슈퍼비전</option>
              <option>기관 분석</option><option>기타</option>
            </select>
          </div>
        </div>
        <div class="field"><label>내용</label><textarea class="a-content" rows="2" placeholder="간단히 적어주세요"></textarea></div>`;
      list.appendChild(d);
      d.querySelector('.a-time').focus();
    }
    function delAct(btn) {
      const list = document.getElementById('actList');
      if (list.children.length <= 1) { toast('최소 1개 필요', false); return; }
      btn.closest('.act-item').remove();
    }

    function getData() {
      const acts = [];
      document.querySelectorAll('.act-item').forEach(el => {
        acts.push({
          time: el.querySelector('.a-time').value.trim(),
          cat: el.querySelector('.a-cat').value,
          content: el.querySelector('.a-content').value.trim()
        });
      });
      return {
        date: document.getElementById('fDate').value,
        day: document.getElementById('fDay').value,
        round: document.getElementById('fRound').value,
        org: document.getElementById('fOrg').value.trim(),
        name: document.getElementById('fName').value.trim(),
        start: document.getElementById('fStart').value.trim(),
        end: document.getElementById('fEnd').value.trim(),
        total: document.getElementById('fTotal').value.trim(),
        goal: document.getElementById('fGoal').value.trim(),
        acts,
        reflect: document.getElementById('fReflect').value.trim(),
        superOp: document.getElementById('fSuper').value.trim(),
        img: document.getElementById('fImg').checked
      };
    }

    function saveSome(d) {
      localStorage.setItem('j_saved', JSON.stringify({
        org: d.org, name: d.name, start: d.start, end: d.end, total: d.total
      }));
    }
    function loadSaved() {
      try {
        const s = JSON.parse(localStorage.getItem('j_saved'));
        if (s) {
          if (s.org) document.getElementById('fOrg').value = s.org;
          if (s.name) document.getElementById('fName').value = s.name;
          if (s.start) document.getElementById('fStart').value = s.start;
          if (s.end) document.getElementById('fEnd').value = s.end;
          if (s.total) document.getElementById('fTotal').value = s.total;
        }
      } catch(e) {}
    }

    async function callGemini(prompt) {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
      });
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || `오류 ${r.status}`); }
      const d = await r.json();
      return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
    }
    async function callGeminiImg(prompt) {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp-image-generation:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseModalities: ["TEXT","IMAGE"] } })
      });
      if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error?.message || `이미지 오류 ${r.status}`); }
      const d = await r.json();
      for (const p of (d.candidates?.[0]?.content?.parts || [])) { if (p.inlineData) return `data:${p.inlineData.mimeType};base64,${p.inlineData.data}`; }
      return null;
    }

    async function generate() {
      const d = getData();
      if (!apiKey) { toast('API 키를 설정해주세요', false); toggleApi(); return; }
      if (!d.date) { toast('실습일을 입력해주세요', false); return; }
      if (d.acts.every(a => !a.content)) { toast('활동을 1개 이상 입력해주세요', false); return; }
      saveSome(d);
      showOverlay(true);

      const actText = d.acts.filter(a=>a.content).map(a=>`- ${a.time||'미정'} | ${a.cat} | ${a.content}`).join('\n');
      const prompt = `당신은 사회복지학과 현장실습 일지 작성 전문가입니다.
배움사이버평생교육원 양식에 맞춰 실습일지를 작성해주세요.

## 정보
- 실습일: ${d.date} (${d.day})
- ${d.round||'-'}회차
- 기관: ${d.org||'미기재'}
- 출근 ${d.start||'09:00'} / 퇴근 ${d.end||'18:00'} / 총 ${d.total||'8'}시간

## 목표
${d.goal || '(적절한 목표 생성)'}

## 활동
${actText}
${d.reflect ? `\n## 실습생 의견 키워드\n${d.reflect}` : ''}
${d.superOp ? `\n## 실습지도자 의견\n${d.superOp}` : ''}

## 지침
1. 목표: 1~2문장, 당일 학습목표
2. 진행사항: 시간대별 2~4문장, 실습생 역할+관찰+배운점
3. 실습생 의견: 3~5문장, 사회복지 가치 연결 성찰
4. 실습지도자 의견: 2~3문장, 태도+개선점
5. 식사/휴식시간은 실습시간 미인정으로 기록
6. 클라이언트 실명 사용 금지, 전문적 문체

## JSON 출력
\`\`\`json
{
  "goal": "목표 1-2문장",
  "timeActivities": [{"time":"09:00~10:00","content":"상세 2-4문장"}],
  "studentOpinion": "3-5문장",
  "supervisorOpinion": "2-3문장"
}
\`\`\`
JSON만 출력.`;

      try {
        const raw = await callGemini(prompt);
        let jd;
        try {
          const m = raw.match(/```json\s*([\s\S]*?)\s*```/) || raw.match(/\{[\s\S]*\}/);
          jd = JSON.parse(m ? (m[1]||m[0]) : raw);
        } catch(e) { throw new Error('응답 파싱 실패. 다시 시도해주세요.'); }
        render(d, jd);
        if (d.img) genImg(d, jd);
        showOverlay(false);
        toast('실습일지가 생성되었습니다', true);
        document.getElementById('resultArea').scrollIntoView({ behavior:'smooth', block:'start' });
      } catch(e) {
        showOverlay(false);
        if (e.message.includes('API_KEY')||e.message.includes('401')||e.message.includes('403')) {
          toast('API 키가 유효하지 않습니다', false); setApiBadge(false);
        } else { toast(e.message, false); }
      }
    }

    function render(f, j) {
      const md = f.date ? new Date(f.date) : new Date();
      const dateStr = `${md.getMonth()+1}월 ${md.getDate()}일`;
      const rows = j.timeActivities.map(a => `<tr><td class="j-p-time">${a.time}</td><td class="j-p-content">${a.content}</td></tr>`).join('');
      document.getElementById('journalOut').innerHTML = `
        <div class="j-head"><h2>실 습 일 지${f.round ? ` (${f.round}회)` : ''}</h2></div>
        <table class="j-table">
          <tr>
            <th>실습일</th>
            <td colspan="2">${dateStr} ${f.day}요일</td>
            <th>결재</th>
            <td class="j-stamp">실습생<br><div class="j-stamp-circle">㊞</div></td>
            <td class="j-stamp">실습지도자<br><div class="j-stamp-circle">㊞</div></td>
          </tr>
          <tr>
            <th>출근</th><td>${f.start||'09:00'}</td>
            <th>퇴근</th><td>${f.end||'18:00'}</td>
            <th colspan="2">총 ${f.total||'8'}시간</th>
          </tr>
          <tr><th>목 표</th><td colspan="5" style="line-height:1.8">${j.goal}</td></tr>
          <tr><td colspan="6" class="j-section-note">시간 | 진행사항 — 식사·휴식시간은 실습시간으로 인정되지 않음</td></tr>
          <tr><td colspan="6" class="j-progress"><table class="j-p-table">${rows}</table></td></tr>
          <tr><th>실습생<br>의견</th><td colspan="5" class="j-opinion">${j.studentOpinion}</td></tr>
          <tr><th>실습<br>지도자<br>의견</th><td colspan="5" class="j-opinion">${j.supervisorOpinion}</td></tr>
        </table>
        <div id="imgBox"></div>`;
      document.getElementById('resultArea').classList.add('on');
      plainText = `실습일지 (${f.round||'-'}회)\n${'='.repeat(40)}\n실습일: ${f.date} (${f.day})\n출근: ${f.start||'09:00'} | 퇴근: ${f.end||'18:00'} | 총 ${f.total||'8'}시간\n\n[목표]\n${j.goal}\n\n[진행사항]\n${j.timeActivities.map(a=>`${a.time}\n  ${a.content}`).join('\n\n')}\n\n[실습생 의견]\n${j.studentOpinion}\n\n[실습지도자 의견]\n${j.supervisorOpinion}`;
    }

    async function genImg(f, j) {
      const box = document.getElementById('imgBox');
      box.innerHTML = `<div class="j-img-section"><h4>활동 일러스트</h4><div class="img-loading"><div class="mini-spin"></div>생성 중...</div></div>`;
      const summary = j.timeActivities.map(a=>a.content).join(', ');
      try {
        const img = await callGeminiImg(`A warm watercolor illustration of a social work student's day at "${f.org}": ${summary}. Soft pastel, Korean welfare center, no text.`);
        box.innerHTML = img
          ? `<div class="j-img-section"><h4>활동 일러스트</h4><img src="${img}" alt="활동 일러스트"></div>`
          : `<div class="j-img-section"><h4>활동 일러스트</h4><p class="hint">이미지 생성 실패</p></div>`;
      } catch(e) {
        box.innerHTML = `<div class="j-img-section"><h4>활동 일러스트</h4><p class="hint">오류: ${e.message}</p></div>`;
      }
    }

    function copyText() {
      if (!plainText) return;
      navigator.clipboard.writeText(plainText).then(()=>toast('복사됨',true)).catch(()=>{
        const t=document.createElement('textarea'); t.value=plainText;
        document.body.appendChild(t); t.select(); document.execCommand('copy');
        document.body.removeChild(t); toast('복사됨',true);
      });
    }
    function dlHTML() {
      const h = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>실습일지</title>
<style>body{font-family:'Noto Sans KR',sans-serif;max-width:800px;margin:40px auto;padding:20px;color:#1D1D1F;line-height:1.7}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #D2D2D7;padding:10px 12px;text-align:left;vertical-align:middle}
th{background:#F5F5F7;font-weight:600;text-align:center;font-size:12px}h2{text-align:center;letter-spacing:8px}
img{max-width:100%;border-radius:10px}.j-stamp-circle{display:inline-block;width:36px;height:36px;border:1.5px solid #D2D2D7;border-radius:50%;line-height:33px;font-size:10px;color:#C7C7CC;margin-top:3px;text-align:center}
.j-stamp{text-align:center;font-size:11px;color:#AEAEB2}.j-p-table{width:100%;border-collapse:collapse}.j-p-table td{border:none;border-bottom:1px solid #F2F2F7;padding:8px 14px}
.j-p-table tr:last-child td{border-bottom:none}.j-p-time{width:88px;text-align:center;font-weight:500;font-size:12px;border-right:1px solid #F2F2F7!important}</style></head>
<body>${document.getElementById('journalOut').innerHTML}</body></html>`;
      const b = new Blob([h],{type:'text/html;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `실습일지_${document.getElementById('fRound').value||''}회_${document.getElementById('fDate').value||''}.html`;
      a.click(); URL.revokeObjectURL(a.href);
      toast('다운로드 시작',true);
    }

    function showOverlay(on) {
      document.getElementById('overlay').classList.toggle('on',on);
      document.getElementById('genBtn').disabled = on;
      if (on) {
        const msgs = ['일지를 작성하고 있습니다','활동 내용을 분석 중','표현을 다듬고 있습니다','거의 완성되었습니다'];
        let i=0;
        window._ov = setInterval(()=>{ i=(i+1)%msgs.length; document.getElementById('overlayText').textContent=msgs[i]; },2500);
      } else { clearInterval(window._ov); }
    }
    function toast(msg, ok) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${ok?'ok':'err'} show`;
      setTimeout(()=>t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
